<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Constantine Spelling - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: #064e3b;
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(34,197,94,0.15) 0%, transparent 60%),
                repeating-linear-gradient(0deg, transparent, transparent 79px, rgba(255,255,255,0.03) 79px, rgba(255,255,255,0.03) 80px),
                repeating-linear-gradient(90deg, transparent, transparent 79px, rgba(255,255,255,0.03) 79px, rgba(255,255,255,0.03) 80px);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.5), 0 0 0 2px rgba(22,163,74,0.3);
            max-width: 400px;
            width: 100%;
            padding: 40px 36px;
            text-align: center;
        }

        .logo {
            font-size: 4em;
            margin-bottom: 12px;
            display: block;
            animation: bounce 1.5s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-12px) rotate(5deg); }
        }

        h1 {
            font-family: 'Bangers', cursive;
            color: #14532d;
            margin-bottom: 6px;
            font-size: 2.4em;
            letter-spacing: 3px;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.08);
        }

        .tagline {
            color: #6b7280;
            margin-bottom: 28px;
            font-size: 1em;
            font-weight: 600;
        }

        input[type="password"] {
            width: 100%;
            padding: 14px 18px;
            font-size: 1.1em;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            margin-bottom: 16px;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            letter-spacing: 3px;
            transition: all 0.2s;
            color: #14532d;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: #16a34a;
            box-shadow: 0 0 0 4px rgba(22,163,74,0.15);
        }

        button {
            width: 100%;
            padding: 15px;
            font-size: 1.1em;
            background: linear-gradient(135deg, #16a34a 0%, #065f46 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 800;
            font-family: 'Nunito', sans-serif;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(22,163,74,0.4), 0 2px 4px rgba(0,0,0,0.2);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(22,163,74,0.5), 0 4px 8px rgba(0,0,0,0.2);
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
        }

        button:active {
            transform: translateY(0);
        }

        .error {
            color: #dc2626;
            margin-top: 14px;
            display: none;
            font-weight: 800;
            background: #fef2f2;
            border: 2px solid #fca5a5;
            border-radius: 10px;
            padding: 10px;
        }

        .info {
            color: #9ca3af;
            font-size: 0.8em;
            margin-top: 16px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <span class="logo">⚽</span>
        <h1>Constantine Spelling</h1>
        <p class="tagline">Enter your password to kick off!</p>

        <input type="password" id="passwordInput" placeholder="Password" onkeypress="handleKeyPress(event)">
        <button onclick="checkPassword()">⚽ Kick Off!</button>

        <div class="error" id="errorMessage">❌ Wrong password. Try again!</div>
        <div class="info">Password is case-sensitive</div>
    </div>

    <script>
        const CORRECT_PASSWORD = 'spelling123';
        const GAME_FILE = 'index.html';

        function checkPassword() {
            const input = document.getElementById('passwordInput').value;
            const errorMsg = document.getElementById('errorMessage');

            if (input === CORRECT_PASSWORD) {
                sessionStorage.setItem('authenticated', 'true');
                window.location.href = GAME_FILE;
            } else {
                errorMsg.style.display = 'block';
                document.getElementById('passwordInput').value = '';
                document.getElementById('passwordInput').focus();
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') checkPassword();
        }

        window.onload = () => {
            document.getElementById('passwordInput').focus();
        };
    </script>
</body>
</html>
