<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Constantine Spelling - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }

        h1 {
            color: #000000;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .logo {
            font-size: 3em;
            margin-bottom: 20px;
        }

        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        input[type="password"] {
            width: 100%;
            padding: 15px;
            font-size: 1.2em;
            border: 2px solid #ccc;
            border-radius: 10px;
            margin-bottom: 20px;
            font-family: 'Arial', sans-serif;
            letter-spacing: 2px;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: #000000;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.1);
        }

        button {
            width: 100%;
            padding: 15px;
            font-size: 1.1em;
            background: #000000;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #333333;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .error {
            color: #d32f2f;
            margin-top: 15px;
            display: none;
            font-weight: bold;
        }

        .info {
            color: #666;
            font-size: 0.9em;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">⚽</div>
        <h1>Constantine Spelling</h1>
        <p>Enter password to begin</p>
        
        <input type="password" id="passwordInput" placeholder="Enter password" onkeypress="handleKeyPress(event)">
        <button onclick="checkPassword()">Access Game</button>
        
        <div class="error" id="errorMessage">❌ Incorrect password. Try again.</div>
        <div class="info">Password is case-sensitive</div>
    </div>

    <script>
        // Configuration - Change this password!
        const CORRECT_PASSWORD = 'spelling123';
        const GAME_FILE = 'index.html';

        function checkPassword() {
            const input = document.getElementById('passwordInput').value;
            const errorMsg = document.getElementById('errorMessage');
            
            if (input === CORRECT_PASSWORD) {
                // Store authentication in sessionStorage (clears when browser closes)
                sessionStorage.setItem('authenticated', 'true');
                // Redirect to game
                window.location.href = GAME_FILE;
            } else {
                errorMsg.style.display = 'block';
                document.getElementById('passwordInput').value = '';
                document.getElementById('passwordInput').focus();
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                checkPassword();
            }
        }

        // Focus on password input on page load
        window.onload = () => {
            document.getElementById('passwordInput').focus();
        };
    </script>
</body>
</html>
